<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAMA DOLLARS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --gold-mid: #D4A017;
    --red: #CC0000;
    --cream: #FFF8E7;
    --ink: #1a1008;
    --paper: #F5ECD7;
    --paper2: #EDE0C4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--paper);
    background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(139,105,20,0.07) 27px,rgba(139,105,20,0.07) 28px);
    min-height:100vh; font-family:'Special Elite',cursive; color:var(--ink);
  }

  /* ── NAV ── */
  nav {
    background:var(--ink); display:flex; align-items:center;
    justify-content:space-between; padding:0 20px; height:58px;
    position:sticky; top:0; z-index:100; border-bottom:3px solid var(--gold-dark);
  }
  .nav-logo {
    display:flex; align-items:center; gap:10px; cursor:pointer; text-decoration:none;
  }
  .nav-logo-svg { width:36px; height:36px; flex-shrink:0; }
  .nav-logo-text {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px;
    color:var(--gold); line-height:1; display:flex; flex-direction:column;
  }
  .nav-logo-text span:last-child { font-size:11px; letter-spacing:6px; color:var(--gold-dark); margin-top:-2px; }
  .nav-tabs { display:flex; }
  .nav-tab {
    font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:3px;
    color:rgba(255,248,231,0.5); padding:0 16px; height:58px;
    display:flex; align-items:center; cursor:pointer;
    border-bottom:3px solid transparent; margin-bottom:-3px;
    transition:all .2s; border:none; background:none;
  }
  .nav-tab:hover { color:var(--cream); }
  .nav-tab.active { color:var(--gold); border-bottom:3px solid var(--gold); }

  /* ── SCREENS ── */
  .screen { display:none; max-width:820px; margin:0 auto; padding:28px 20px 60px; }
  .screen.active { display:block; }

  /* ── SHARED ── */
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; color:var(--gold-dark); }
  .field select, .field input {
    width:100%; background:var(--cream); border:2px solid var(--ink);
    padding:10px 14px; font-family:'Special Elite',cursive; font-size:15px;
    color:var(--ink); -webkit-appearance:none; appearance:none;
  }
  .field select:focus, .field input:focus { outline:none; border-color:var(--gold-dark); }
  .btn-primary {
    width:100%; background:var(--ink); color:var(--gold); border:none; padding:14px;
    font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:5px;
    cursor:pointer; transition:all .2s; box-shadow:3px 3px 0 var(--gold-dark);
  }
  .btn-primary:hover { background:#2d1f0a; box-shadow:5px 5px 0 var(--gold-dark); transform:translate(-1px,-1px); }
  .msg-error { background:var(--red); color:var(--cream); padding:8px 14px; font-size:12px; letter-spacing:2px; margin-top:12px; display:none; text-align:center; }
  .msg-success { background:#1a4a1a; color:#aaffaa; padding:10px 16px; font-size:12px; letter-spacing:2px; margin-top:14px; display:none; text-align:center; border:1px solid #4a8a4a; }
  .page-header { border-top:5px double var(--ink); border-bottom:2px solid var(--ink); text-align:center; padding:12px; margin-bottom:20px; }
  .page-header h2 { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:6px; text-shadow:2px 2px 0 var(--gold-dark); }
  .page-header p { font-family:'Playfair Display',serif; font-style:italic; font-size:11px; letter-spacing:3px; color:var(--gold-dark); }

  /* ── MASTHEAD ── */
  .masthead {
    text-align:center; margin-bottom:20px;
    border-top:5px double var(--ink); border-bottom:5px double var(--ink);
    padding:20px 20px 16px; position:relative;
  }
  .masthead-logo-wrap {
    display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:8px;
  }
  .masthead-logo-svg { width:80px; height:80px; }
  .masthead-title-block { text-align:left; }
  .masthead h1 {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,12vw,100px);
    line-height:.88; letter-spacing:4px;
    text-shadow:4px 4px 0 var(--gold-dark),6px 6px 0 rgba(0,0,0,.1);
  }
  .masthead .sub {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,4.5vw,38px);
    letter-spacing:10px; color:var(--red); display:block; margin-top:-2px;
  }
  .masthead-tagline {
    font-family:'Playfair Display',serif; font-style:italic;
    font-size:11px; letter-spacing:3px; color:var(--gold-dark); margin-top:8px;
  }
  .masthead-rule { display:flex; align-items:center; gap:8px; margin:10px 0 0; }
  .masthead-rule hr { flex:1; border:none; border-top:1px solid var(--gold-dark); }
  .masthead-rule span { font-size:10px; letter-spacing:4px; color:var(--gold-dark); }

  /* ── BREAKING NEWS TICKER ── */
  .breaking-bar {
    background: var(--red); display:flex; align-items:stretch;
    margin-bottom:16px; overflow:hidden; height:38px;
    border-top:2px solid #990000; border-bottom:2px solid #990000;
  }
  .breaking-label {
    background: var(--cream); color: var(--red);
    font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:3px;
    padding:0 14px; display:flex; align-items:center; flex-shrink:0;
    border-right:3px solid #990000; white-space:nowrap;
  }
  .breaking-track { flex:1; overflow:hidden; display:flex; align-items:center; position:relative; }
  .breaking-scroll {
    display:flex; gap:0; align-items:center;
    white-space:nowrap;
    animation: ticker 22s linear infinite;
    will-change: transform;
  }
  .breaking-scroll:hover { animation-play-state: paused; }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tick-item {
    font-family:'Special Elite',cursive; font-size:13px;
    color: var(--cream); letter-spacing:1px; padding:0 6px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .tick-dot {
    color: var(--gold); font-size:16px; margin:0 10px;
  }
  .tick-amount { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--gold); letter-spacing:1px; }

  /* ── LEADERBOARD ── */
  .leaderboard { border:2px solid var(--ink); }
  .lb-row { display:grid; grid-template-columns:50px 1fr auto; padding:12px 18px; border-bottom:1px solid rgba(26,16,8,.13); align-items:center; transition:background .15s; }
  .lb-row:last-child { border-bottom:none; }
  .lb-row:hover { background:rgba(255,215,0,.07); }
  .lb-row.r1 { background:linear-gradient(90deg,rgba(255,215,0,.18),transparent 65%); }
  .lb-row.r2 { background:linear-gradient(90deg,rgba(192,192,192,.15),transparent 65%); }
  .lb-row.r3 { background:linear-gradient(90deg,rgba(205,127,50,.14),transparent 65%); }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:26px; opacity:.25; text-align:center; line-height:1; }
  .r1 .lb-rank { opacity:1; color:var(--gold-dark); font-size:30px; }
  .r2 .lb-rank { opacity:1; color:#888; font-size:28px; }
  .r3 .lb-rank { opacity:1; color:#9C6B2E; font-size:28px; }
  .lb-name { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; }
  .r1 .lb-name { font-size:28px; }
  .lb-title { font-family:'Playfair Display',serif; font-style:italic; font-size:11px; color:var(--gold-dark); }
  .lb-coins { text-align:right; }
  .lb-num { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; line-height:1; }
  .r1 .lb-num { font-size:36px; color:var(--gold-dark); }
  .lb-lbl { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:#aaa; }
  .lb-bar-wrap { grid-column:1/-1; padding:0 0 8px 50px; }
  .lb-bar-track { height:3px; background:rgba(26,16,8,.1); border-radius:2px; overflow:hidden; margin-top:5px; }
  .lb-bar-fill { height:100%; background:var(--gold-dark); border-radius:2px; transition:width 1s cubic-bezier(.34,1.56,.64,1); }
  .r1 .lb-bar-fill { background:linear-gradient(90deg,var(--gold),var(--gold-dark)); }
  .r2 .lb-bar-fill { background:#bbb; }

  /* ── SEND ── */
  .send-card { background:var(--paper2); border:2px solid var(--ink); padding:28px 32px; box-shadow:5px 5px 0 var(--ink); }
  .send-card h3 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; border-bottom:1px solid var(--gold-dark); padding-bottom:10px; margin-bottom:20px; }
  .send-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:520px){ .send-grid { grid-template-columns:1fr; } }
  .field-full { grid-column:1/-1; }
  .balance-chip {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--ink); color:var(--gold);
    font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px;
    padding:5px 14px; margin-bottom:20px; transition:opacity .3s;
  }
  .balance-chip.hidden { opacity:0; pointer-events:none; }
  .balance-chip svg { width:18px; height:18px; }

  /* ── TRANSACTIONS ── */
  .tx-filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .tx-filter { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; padding:5px 14px; border:2px solid var(--ink); background:transparent; cursor:pointer; transition:all .2s; color:var(--ink); }
  .tx-filter.active, .tx-filter:hover { background:var(--ink); color:var(--gold); }
  .tx-list { display:flex; flex-direction:column; border:2px solid var(--ink); }
  .tx-item { padding:14px 18px; border-bottom:1px solid rgba(26,16,8,.13); animation:fadeIn .3s ease; }
  .tx-item:last-child { border-bottom:none; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .tx-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .tx-parties { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; line-height:1.2; }
  .tx-from { color:var(--red); }
  .tx-arrow { color:var(--gold-dark); margin:0 6px; }
  .tx-to { color:#1a5a1a; }
  .tx-amount { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold-dark); letter-spacing:1px; white-space:nowrap; }
  .tx-desc { font-family:'Playfair Display',serif; font-style:italic; font-size:13px; margin-top:4px; color:#555; }
  .tx-meta { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#aaa; margin-top:5px; }
  .tx-empty { padding:40px; text-align:center; font-family:'Playfair Display',serif; font-style:italic; color:#bbb; font-size:16px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--paper); }
  ::-webkit-scrollbar-thumb { background:var(--gold-dark); }

  @media(max-width:560px) {
    .masthead-logo-wrap { flex-direction:column; gap:8px; }
    .masthead-title-block { text-align:center; }
    nav { padding:0 12px; }
    .nav-logo-text span:first-child { font-size:18px; }
    .nav-logo-text span:last-child { font-size:9px; }
    .nav-tab { padding:0 10px; font-size:12px; letter-spacing:1px; }
  }
</style>
</head>

  "Annie": "64170e468b7e157908d80155fdfcbc937e602154c5926ebae9eab6ad6cfd28bc",
  "Pooja": "7f0fd14133c99ed8e27713e80915fb5419cba3e4d125ee804a058ccb8a969407",
  "Nirmal": "a9937213c5d1da528607e88aa046d91853a2628556a9ae793fb45beaaefe6200",

  "Shaishta": "f911684b5f4335fb5da912d4ac317e51b99923d9e27be9625b7cae01d867ae26",

};
const NAMES  = Object.keys(PASSWORD_HASHES);
const TITLES = [
  "Supreme Drama Monarch","Distinguished Dollar Holder","Notable Currency Keeper",
  "Respected Drama Patron","Drama Dollar Participant","Humble Dollar Guardian",
  "Struggling Dramatist","Broke but Iconic"
];

const DEFAULT_BALANCES = {
  Arooshay: 1035,
  Shaishta: 1015,
  Nesreen: 1005,
  Annie: 1005,
  Pooja: 1005,
  Mujahid: 1005,
  Sid: 995,
  Nirmal: 935
};

let balances = { ...DEFAULT_BALANCES };
let transactions = [];
let currentFilter = 'all';

function fmt(n) { return '$' + Number(n || 0).toLocaleString(); }

function txDate(tx) {
  const raw = tx.time ?? tx.timestamp ?? tx.createdAt ?? null;
  if (!raw) return new Date();
  if (typeof raw?.toDate === 'function') return raw.toDate();
  return new Date(raw);
}

async function sha256Hex(value) {
  const data = new TextEncoder().encode(value);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function passwordMatches(name, password) {
  if (!name || !(name in PASSWORD_HASHES)) return false;
  const hash = await sha256Hex((PASSWORD_SALTS[name] || '') + password);
  return hash === PASSWORD_HASHES[name];
}

async function ensureBalancesDoc() {
  const ref = doc(db, "balances", "main");
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await runTransaction(db, async (tx) => {
      tx.set(ref, DEFAULT_BALANCES);
    });
  }
}

async function loadData() {
  await ensureBalancesDoc();
}

function renderTicker() {
  const el = document.getElementById('ticker-scroll');
  if (!el) return;
  const tickerTx = transactions.filter(tx => tx.from !== 'system').slice(0, 8);
  if (!tickerTx.length) {
    el.innerHTML = `<span class="tick-item">No transactions yet — the drama hasn't started</span>`;
    return;
  }
  const makeItems = () => tickerTx.map(tx => {
    const d = txDate(tx);
    const time = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
      d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    return `<span class="tick-item"><span style="color:var(--gold);font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${tx.from}</span> sent <span class="tick-amount">${fmt(tx.amount)}</span> to <span style="color:#ffeeaa;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${tx.to}</span> — <em style="opacity:.8;font-size:11px">${tx.desc}</em> <span style="opacity:.5;font-size:10px">${time}</span></span><span class="tick-dot">✦</span>`;
  }).join('');
  el.innerHTML = makeItems() + makeItems();
}

function renderLeaderboard() {
  renderTicker();
  const sorted = [...NAMES].sort((a,b) => (balances[b] || 0) - (balances[a] || 0));
  const max    = Math.max(...NAMES.map(n => balances[n] || 0), 1);
  document.getElementById('lb-date').textContent =
    '— ' + new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase() + ' —';

  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';
  sorted.forEach((name, i) => {
    const rc    = i<3 ? `r${i+1}` : '';
    const badge = i<3 ? ['I','II','III'][i] : i+1;
    const pct   = Math.max(5, Math.round(((balances[name] || 0)/max)*100));
    const row   = document.createElement('div');
    row.className = `lb-row ${rc}`;
    row.innerHTML = `
      <div class="lb-rank">${badge}</div>
      <div>
        <div class="lb-name">${name}</div>
        <div class="lb-title">${TITLES[Math.min(i,7)]}</div>
      </div>
      <div class="lb-coins">
        <div class="lb-num">${fmt(balances[name])}</div>
        <div class="lb-lbl">Drama Dollars</div>
      </div>
      <div class="lb-bar-wrap">
        <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    list.appendChild(row);
  });
}

function resetSendForm() {
  document.getElementById('tx-from').value = '';
  document.getElementById('tx-to').innerHTML = '<option value="">— Select recipient —</option>';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-pass').value = '';
  document.getElementById('balance-text').textContent = 'SELECT A SENDER FIRST';
  document.getElementById('sender-balance').classList.add('hidden');
  document.getElementById('tx-success').style.display = 'none';
  document.getElementById('tx-error').style.display = 'none';
}

function onSenderChange() {
  const from  = document.getElementById('tx-from').value;
  const toSel = document.getElementById('tx-to');
  const chip  = document.getElementById('sender-balance');
  document.getElementById('tx-success').style.display = 'none';
  document.getElementById('tx-error').style.display = 'none';
  toSel.innerHTML = '<option value="">— Select recipient —</option>';
  if (!from) {
    chip.classList.add('hidden');
    return;
  }
  NAMES.filter(n => n !== from).forEach(n => {
    toSel.innerHTML += `<option>${n}</option>`;
  });
  document.getElementById('balance-text').textContent =
    `${from.toUpperCase()}'S BALANCE: ${fmt(balances[from] || 0)}`;
  chip.classList.remove('hidden');
}

async function doTransaction() {
  const from   = document.getElementById('tx-from').value;
  const to     = document.getElementById('tx-to').value;
  const amount = parseInt(document.getElementById('tx-amount').value, 10);
  const desc   = document.getElementById('tx-desc').value.trim();
  const pass   = document.getElementById('tx-pass').value;
  const errEl  = document.getElementById('tx-error');
  const okEl   = document.getElementById('tx-success');
  const submitBtn = document.getElementById('submit-btn');
  errEl.style.display='none';
  okEl.style.display='none';

  if (!from)               { errEl.textContent="Please select who is sending."; errEl.style.display='block'; return; }
  if (!to)                 { errEl.textContent="Please select a recipient."; errEl.style.display='block'; return; }
  if (!amount || amount<1) { errEl.textContent="Enter a valid amount (at least $1)."; errEl.style.display='block'; return; }
  if (!desc)               { errEl.textContent="Please add a description."; errEl.style.display='block'; return; }
  if (!(await passwordMatches(from, pass))) {
    errEl.textContent="Wrong password. Transaction denied.";
    errEl.style.display='block';
    return;
  }

  const balRef = doc(db, "balances", "main");
  try {
    submitBtn.disabled = true;
    submitBtn.textContent = 'PROCESSING...';

    const snap = await getDoc(balRef);
    if (!snap.exists()) throw new Error("Balances document is missing.");
    const data = snap.data();
    const fromBal = Number(data[from] || 0);
    const toBal = Number(data[to] || 0);

    if (fromBal < amount) throw new Error(`Not enough. ${from} only has ${fmt(fromBal)}.`);

    await updateDoc(balRef, {
      [from]: fromBal - amount,
      [to]: toBal + amount
    });

    await addDoc(collection(db, "transactions"), {
      from,
      to,
      amount,
      desc,
      timestamp: serverTimestamp()
    });

    okEl.textContent = 'Transaction recorded and synced live.';
    okEl.style.display='block';
    document.getElementById('tx-amount').value='';
    document.getElementById('tx-desc').value='';
    document.getElementById('tx-pass').value='';
  } catch (error) {
    console.error(error);
    errEl.textContent = error.message || 'Transaction failed.';
    errEl.style.display='block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'SUBMIT TRANSACTION';
  }
}

function renderTransactions(filter) {
  currentFilter = filter;
  const filtersEl = document.getElementById('tx-filters');
  filtersEl.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'tx-filter' + (filter==='all'?' active':'');
  allBtn.textContent = 'ALL';
  allBtn.onclick = () => renderTransactions('all');
  filtersEl.appendChild(allBtn);
  NAMES.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'tx-filter' + (filter===n?' active':'');
    btn.textContent = n.toUpperCase();
    btn.onclick = () => renderTransactions(n);
    filtersEl.appendChild(btn);
  });

  const filtered = filter==='all'
    ? transactions
    : transactions.filter(t=>t.from===filter||t.to===filter);

  const list = document.getElementById('tx-list');
  if (!filtered.length) {
    list.innerHTML='<div class="tx-empty">No transactions yet. The drama hasn\'t started.</div>';
    return;
  }
  list.innerHTML='';
  filtered.forEach(tx => {
    const d = txDate(tx);
    const timeStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
      + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const item = document.createElement('div');
    item.className = 'tx-item';
    item.innerHTML = `
      <div class="tx-header">
        <div class="tx-parties">
          <span class="tx-from">${tx.from}</span>
          <span class="tx-arrow">→</span>
          <span class="tx-to">${tx.to}</span>
        </div>
        <div class="tx-amount">${fmt(tx.amount)}</div>
      </div>
      <div class="tx-desc">"${tx.desc || ''}"</div>
      <div class="tx-meta">${timeStr}</div>`;
    list.appendChild(item);
  });
}

function showTab(tab) {
  ['leaderboard','send','transactions'].forEach(s => document.getElementById('screen-'+s).classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  const idx = {leaderboard:0,send:1,transactions:2}[tab];
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (tab==='leaderboard') renderLeaderboard();
  if (tab==='send') resetSendForm();
  if (tab==='transactions') renderTransactions(currentFilter || 'all');
}

function attachRealtimeListeners() {
  const balRef = doc(db, "balances", "main");
  onSnapshot(balRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      balances = { ...DEFAULT_BALANCES, ...data };
      renderLeaderboard();
      const from = document.getElementById('tx-from')?.value;
      if (from) {
        document.getElementById('balance-text').textContent =
          `${from.toUpperCase()}'S BALANCE: ${fmt(balances[from] || 0)}`;
      }
    }
  });

  const txQuery = query(collection(db, "transactions"), orderBy("timestamp", "desc"), limit(100));
  onSnapshot(txQuery, (snap) => {
    transactions = snap.docs.map(d => {
      const data = d.data();
      return {
        id: d.id,
        from: data.from || 'system',
        to: data.to || 'system',
        amount: Number(data.amount || 0),
        desc: data.desc || data.description || '',
        timestamp: data.timestamp || null
      };
    });
    renderTicker();
    renderTransactions(currentFilter || 'all');
  });
}

window.showTab = showTab;
window.onSenderChange = onSenderChange;
window.doTransaction = doTransaction;

await loadData();
attachRealtimeListeners();
renderLeaderboard();
</script>
